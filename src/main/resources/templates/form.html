<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Employee' : 'Add Employee'">Employee Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 24px; color: #333; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        .btn { padding: 12px 24px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #005a9e; }
        .back { display: inline-block; margin-top: 16px; color: #0078d4; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${isEdit} ? 'Edit Employee' : 'Add Employee'">Add Employee</h1>

    <form th:action="@{/save}" th:object="${employee}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" required placeholder="John Doe"/>

        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" required placeholder="john@company.com"/>

        <label for="department">Department</label>
        <input type="text" id="department" th:field="*{department}" placeholder="Engineering"/>

        <label for="salary">Salary</label>
        <input type="number" id="salary" th:field="*{salary}" step="0.01" placeholder="50000"/>

        <button type="submit" class="btn" th:text="${isEdit} ? 'Update' : 'Save'">Save</button>
    </form>

    <a href="/" class="back">← Back to list</a>
</div>
</body>
</html>
