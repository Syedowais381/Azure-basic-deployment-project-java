# Azure App Service profile - set SPRING_PROFILES_ACTIVE=azure

# Prevent H2 autoconfiguration from loading in production
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Accept custom or Spring-standard environment variable names
spring.datasource.url=${SPRING_DATASOURCE_URL:${AZURE_SQL_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${AZURE_SQL_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${AZURE_SQL_PASSWORD}}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Keep pool small for App Service Free/Basic tier memory limits
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=${PORT:8080}
